<!-- products component card and options -->
<div>
  <div class="d-flex align-items-center mb-4">
    <label for="">Categories:</label>
    <select
      class="form-select w-auto d-inline-block ms-2"
      (change)="getfilteredProducts($event)"
    >
      <option value="">All</option>
      <option value="{{ category }}" *ngFor="let category of categories">
        {{ category }}
      </option>
    </select>
  </div>
  <div class="row" *ngIf="!loading">
    <div class="col-md-3 col-sm-12 mb-4" *ngFor="let product of products">
      <div class="card h-100" routerLink="/details/{{ product.id }}">
        <img
          [src]="product.image"
          class="card-img-top"
          alt="mm"
          style="height: 200px; object-fit: cover"
        />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ product.title }}</h5>
          <p class="card-text">{{ product.description }}</p>
          <div class="mt-auto">
            <p class="card-text">
              <strong> ${{ product.price | number: "1.2-2" }} </strong>
            </p>
            <button class="btn btn-success w-100" (click)="addToCart(product)">
              <i class="fas fa-cart-plus me-1"></i>Add to Cart
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-center" *ngIf="loading">
    <app-spinner></app-spinner>
  </div>
</div>
